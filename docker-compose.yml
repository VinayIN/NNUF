services:
  mlops:
    image: nnuf:latest
    container_name: mlops
    working_dir: /notebooks
    command:
      - -lc
      - mlflow server --host 0.0.0.0 --port 5555 --serve-artifacts --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlflow/artifacts --workers 1 --allowed-hosts '*'
    ports:
      - 5555:5555
      - 2718:2718
      - 8888:8888
    volumes:
      - mlflow-artifacts:/mlflow
      - ./seld_pkg/seld_pkg:/seld_pkg:ro
      - ./notebooks:/notebooks:rw
    environment:
      - MLFLOW_TRACKING_URI=http://127.0.0.1:5555
    networks:
      - node_network

  node0:
    image: nnuf:latest
    container_name: processor
    working_dir: /NNUF
    environment:
      - MLFLOW_TRACKING_URI=http://mlops:5555
    networks:
      - node_network
    command:
      - -lc
      - tail -f /dev/null
    depends_on:
      - mlops
    volumes:
      - ./:/NNUF:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G

  node1:
    image: nnuf:latest
    container_name: talker
    working_dir: /NNUF
    environment:
      - MLFLOW_TRACKING_URI=http://mlops:5555
    volumes:
      - ./talker_pkg:/NNUF:rw
    networks:
      - node_network
    stdin_open: true
    tty: true
    depends_on:
      - mlops
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  node2:
    image: nnuf:latest
    container_name: listener
    working_dir: /NNUF
    environment:
      - MLFLOW_TRACKING_URI=http://mlops:5555
    volumes:
      - ./listener_pkg:/NNUF:rw
    networks:
      - node_network
    stdin_open: true
    tty: true
    depends_on:
      - mlops
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  node3:
    image: nnuf:latest
    container_name: seld
    working_dir: /NNUF
    environment:
      - MLFLOW_TRACKING_URI=http://mlops:5555
    volumes:
      - ./seld_pkg:/NNUF:rw
    networks:
      - node_network
    stdin_open: true
    tty: true
    depends_on:
      - mlops
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  mlflow-artifacts:
    driver: local

networks:
  node_network:
    driver: bridge
